<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF-Touring</title>
    <style>
        /* Modern Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.8s ease-in-out;
            padding: 20px;
            background-color: #1a1a1a;
        }

        /* Floating Glassmorphism Container */
        .main-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            color: #ffffff;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            transform: translateY(0);
            animation: floatAnimation 6s ease-in-out infinite;
        }

        /* Subtle Floating Animation */
        @keyframes floatAnimation {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        header p {
            font-size: 1rem;
            color: #e0e0e0;
        }

        /* Dropdown Styling */
        .selector-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        label {
            font-weight: 600;
            font-size: 1.1rem;
        }

        select {
            width: 100%;
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        select option {
            background: #222;
            color: #fff;
        }

        /* Content Sections Grid */
        .content-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .content-layout.active {
            opacity: 1;
            transform: translateY(0);
        }

        .card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            border-left: 5px solid #00ffcc;
        }

        .card h3 {
            margin-bottom: 12px;
            color: #00ffcc;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Specific Lists & Tables */
        .attractions-list {
            list-style: none;
        }

        .attractions-list li {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
        }

        .attractions-list li::before {
            content: "📍";
            margin-right: 10px;
        }

        .budget-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
        }

        .budget-table td {
            padding: 8px 0;
        }

        .budget-table td:first-child {
            font-weight: 600;
            color: #e0e0e0;
            width: 50%;
        }

        .budget-table td:last-child {
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            color: #fff;
        }

        .currency-box {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(0, 255, 204, 0.1);
            padding: 15px;
            border-radius: 10px;
            border: 1px dashed #00ffcc;
        }

        /* Responsive Breakpoints */
        @media (max-width: 600px) {
            .main-container {
                padding: 20px;
            }
            header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <h1>FF-Touring</h1>
            <p>Explore Destinations, Plans & Budgets Seamlessly</p>
        </header>

        <div class="selector-box">
            <label for="destination">Select Your Next Destination:</label>
            <select id="destination" onchange="updateDashboard()">
                <option value="" disabled selected>-- Choose a Country --</option>
                <option value="srilanka">Sri Lanka</option>
                <option value="indonesia">Indonesia</option>
                <option value="china">China</option>
                <option value="malaysia">Malaysia</option>
                <option value="thailand">Thailand</option>
            </select>
        </div>

        <div id="contentDashboard" class="content-layout">
            
            <div class="card">
                <h3>1. Top Tourist Attractions</h3>
                <ul id="attractions" class="attractions-list"></ul>
            </div>

            <div class="card">
                <h3>2. Estimated Budget (INR)</h3>
                <table class="budget-table">
                    <tr>
                        <td>Flight Tickets (Return):</td>
                        <td id="flightCost">₹0</td>
                    </tr>
                    <tr>
                        <td>Stay / Accommodation:</td>
                        <td id="stayCost">₹0</td>
                    </tr>
                    <tr>
                        <td>Miscellaneous Expenses:</td>
                        <td id="miscCost">₹0</td>
                    </tr>
                </table>
            </div>

            <div class="card">
                <h3>3. Currency Exchange Rate</h3>
                <div id="currencyExchange" class="currency-box">Select a destination</div>
            </div>

        </div>
    </div>

    <script>
        // Centralized Travel Data Store
        const travelData = {
            srilanka: {
                backgroundImage: "url('https://images.unsplash.com/photo-1586861635167-e5223aadc9fe?auto=format&fit=crop&w=1600&q=80')", // Sigiriya
                attractions: ["Sigiriya Rock Fortress", "Ella Scenic Train Ride", "Temple of the Sacred Tooth Relic", "Mirissa Whales Watching"],
                flight: "₹18,000 - ₹25,000",
                stay: "₹2,500 - ₹6,000 / night",
                misc: "₹1,500 / day",
                exchange: "1 INR ≈ 3.50 Sri Lankan Rupee (LKR)"
            },
            indonesia: {
                backgroundImage: "url('https://images.unsplash.com/photo-1537996194471-e657df975ab4?auto=format&fit=crop&w=1600&q=80')", // Bali
                attractions: ["Ubud Monkey Forest", "Tanah Lot Temple", "Mount Batur Sunrise Trek", "Gili Islands"],
                flight: "₹25,000 - ₹35,000",
                stay: "₹3,000 - ₹8,000 / night",
                misc: "₹2,000 / day",
                exchange: "1 INR ≈ 190 Indonesian Rupiah (IDR)"
            },
            china: {
                backgroundImage: "url('https://images.unsplash.com/photo-1508009603885-50cf7c579365?auto=format&fit=crop&w=1600&q=80')", // Great Wall
                attractions: ["The Great Wall of China", "The Forbidden City (Beijing)", "Terracotta Army (Xi'an)", "The Bund (Shanghai)"],
                flight: "₹35,000 - ₹50,000",
                stay: "₹4,000 - ₹10,000 / night",
                misc: "₹3,000 / day",
                exchange: "1 Chinese Yuan (CNY) ≈ 11.50 INR"
            },
            malaysia: {
                backgroundImage: "url('https://images.unsplash.com/photo-1596422846543-c5c6ff183fca?auto=format&fit=crop&w=1600&q=80')", // Petronas Towers
                attractions: ["Petronas Twin Towers", "Batu Caves", "Langkawi Sky Bridge", "Penang Street Art"],
                flight: "₹16,000 - ₹22,000",
                stay: "₹2,800 - ₹7,000 / night",
                misc: "₹1,800 / day",
                exchange: "1 Malaysian Ringgit (MYR) ≈ 17.80 INR"
            },
            thailand: {
                backgroundImage: "url('https://images.unsplash.com/photo-1528181304800-2f1258bb9f35?auto=format&fit=crop&w=1600&q=80')", // Thailand Temple
                attractions: ["The Grand Palace (Bangkok)", "Phi Phi Islands", "Chiang Mai Night Bazaar", "Wat Arun"],
                flight: "₹15,000 - ₹22,000",
                stay: "₹2,000 - ₹6,500 / night",
                misc: "₹2,000 / day",
                exchange: "1 Thai Baht (THB) ≈ 2.30 INR"
            }
        };

        function updateDashboard() {
            const dropdown = document.getElementById("destination");
            const selectedCountry = dropdown.value;
            const data = travelData[selectedCountry];

            if (!data) return;

            // 1. Smoothly update background image
            document.body.style.backgroundImage = data.backgroundImage;

            // 2. Update Attractions list
            const attractionsList = document.getElementById("attractions");
            attractionsList.innerHTML = ""; // Clear old data
            data.attractions.forEach(place => {
                const li = document.createElement("li");
                li.textContent = place;
                attractionsList.appendChild(li);
            });

            // 3. Update Budget pricing elements
            document.getElementById("flightCost").textContent = data.flight;
            document.getElementById("stayCost").textContent = data.stay;
            document.getElementById("miscCost").textContent = data.misc;

            // 4. Update Currency Exchange output
            document.getElementById("currencyExchange").textContent = data.exchange;

            // 5. Trigger transition animation for dashboard data entry
            const dashboard = document.getElementById("contentDashboard");
            dashboard.classList.remove("active");
            // Small timeout to allow the browser to register the class removal for the animation
            setTimeout(() => {
                dashboard.classList.add("active");
            }, 50);
        }

        // Set a default global abstract background on first load
        window.onload = function() {
            document.body.style.backgroundImage = "url('https://images.unsplash.com/photo-1488646953014-85cb44e25828?auto=format&fit=crop&w=1600&q=80')";
        }
    </script>
</body>
</html>
