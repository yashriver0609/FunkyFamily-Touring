<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funky Family - Touring</title>
    <style>
        /* Modern Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* Helps with mobile scrolling */
            transition: background-image 0.8s ease-in-out;
            padding: 20px;
            background-color: #1a1a1a;
        }

        /* Floating Glassmorphism Container */
        .main-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            color: #ffffff;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            transform: translateY(0);
            animation: floatAnimation 6s ease-in-out infinite;
        }

        /* Subtle Floating Animation */
        @keyframes floatAnimation {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        header p {
            font-size: 1rem;
            color: #e0e0e0;
        }

        /* Dropdown Styling */
        .selector-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        label {
            font-weight: 600;
            font-size: 1.1rem;
        }

        select {
            width: 100%;
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        select option {
            background: #222;
            color: #fff;
        }

        /* Content Sections Grid */
        .content-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .content-layout.active {
            opacity: 1;
            transform: translateY(0);
        }

        .card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            border-left: 5px solid #00ffcc;
        }

        .card h3 {
            margin-bottom: 12px;
            color: #00ffcc;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Specific Lists & Tables */
        .attractions-list {
            list-style: none;
        }

        .attractions-list li {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
        }

        .attractions-list li::before {
            content: "📍";
            margin-right: 10px;
        }

        .budget-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
        }

        .budget-table td {
            padding: 8px 0;
        }

        .budget-table td:first-child {
            font-weight: 600;
            color: #e0e0e0;
            width: 50%;
        }

        .budget-table td:last-child {
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            color: #fff;
        }

        .currency-box {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            background: rgba(0, 255, 204, 0.1);
            padding: 15px;
            border-radius: 10px;
            border: 1px dashed #00ffcc;
        }

        /* Responsive Breakpoints */
        @media (max-width: 600px) {
            .main-container {
                padding: 20px;
            }
            header h1 {
                font-size: 1.8rem;
            }
            .budget-table td {
                font-size: 0.95rem; /* Slightly smaller on mobile to fit "INR" text */
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <h1>Funky Family - Touring</h1>
            <p>Explore Destinations, Plans & Budgets Seamlessly</p>
        </header>

        <div class="selector-box">
            <label for="destination">Select Your Next Destination:</label>
            <select id="destination" onchange="updateDashboard()">
                <option value="" disabled selected>-- Choose a Country --</option>
                <option value="srilanka">Sri Lanka</option>
                <option value="indonesia">Indonesia</option>
                <option value="china">China</option>
                <option value="malaysia">Malaysia</option>
                <option value="thailand">Thailand</option>
                <option value="nepal">Nepal</option>
                <option value="vietnam">Vietnam</option>
            </select>
        </div>

        <div id="contentDashboard" class="content-layout">
            
            <div class="card">
                <h3>1. Top Tourist Attractions</h3>
                <ul id="attractions" class="attractions-list"></ul>
            </div>

            <div class="card">
                <h3>2. Estimated Budget</h3>
                <table class="budget-table">
                    <tr>
                        <td>Flight Tickets (Return):</td>
                        <td id="flightCost">₹0 INR</td>
                    </tr>
                    <tr>
                        <td>Stay / Accommodation:</td>
                        <td id="stayCost">₹0 INR</td>
                    </tr>
                    <tr>
                        <td>Miscellaneous Expenses:</td>
                        <td id="miscCost">₹0 INR</td>
                    </tr>
                </table>
            </div>

            <div class="card">
                <h3>3. Currency Exchange Rate</h3>
                <div id="currencyExchange" class="currency-box">Select a destination</div>
            </div>

        </div>
    </div>
